####################################################################################################
#                             SIMPLE FIVEM SERVER.CFG (BEGINNER READY)
####################################################################################################

# ===== BASIC SERVER INFO =====
sv_hostname "INSERT SERVER NAME HERE"
sets sv_projectName "INSERT PROJECT NAME HERE"
sets sv_projectDesc "INSERT DESCRIPTION HERE"

# ===== PLAYERS =====
sv_maxclients 10   -- number of players you paid for on hosting or fivem server. Usually start with 10.

# ===== LICENSE (REQUIRED) =====
sv_licenseKey "INSERT LICENSE KEY HERE"   --  LICENSE KEY (GET FROM https://keymaster.fivem.net)


# ===== CONNECTION (DO NOT TOUCH) =====
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# ===== PASSWORD (OPTIONAL) =====
sv_password "INSERT PASSWORD HERE"

# ===== DATABASE =====
set mysql_connection_string "mysql://root:INSERT_PASSWORD_HERE@127.0.0.1:3306/qbcore?charset=utf8mb4"

Look for "INSERT_PASSWORD_HERE" and in your hosting server this information will be there. Make sure to have SQL mariadb
Then use the software inside (filezilla) or (WinSCP) inside your hosting server to transfer all files.  

####################################################################################################
#                                      READ THIS (IMPORTANT)
####################################################################################################

# YOU ONLY NEED TO CHANGE 4 THINGS:

# 1. SERVER NAME
# sv_hostname "INSERT SERVER NAME HERE"

# 2. LICENSE KEY (GET FROM https://keymaster.fivem.net)
# sv_licenseKey "INSERT LICENSE KEY HERE"

# 3. PASSWORD (OPTIONAL)
# sv_password "INSERT PASSWORD HERE"

# 4. DATABASE PASSWORD
# INSERT_PASSWORD_HERE


# ----------------------------------------------------------------------------------

# THAT'S IT.
# IF YOU FILLED THOSE 4 THINGS, YOUR SERVER WILL START.
